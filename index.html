<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link rel="icon" type="image/svg+xml" href="https://raw.githubusercontent.com/HR-Directions/HOME/refs/heads/main/logo.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الإدارة المالية المتكامل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; }
        .sidebar-transition { transition: transform 0.3s ease-in-out; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #4f46e5; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .nav-active { background-color: #4f46e5 !important; color: white !important; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="overflow-hidden">

    <div id="login-screen" class="min-h-screen flex items-center justify-center bg-slate-100 p-4">
        <div class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-200">
            <div class="bg-indigo-600 p-6 text-center">
                <h2 id="auth-title" class="text-2xl font-bold text-white">نظام الإدارة المالية</h2>
                <p id="auth-subtitle" class="text-indigo-100 mt-2 text-sm">تسجيل الدخول الآمن للموظفين</p>
            </div>
            
            <div class="p-8">
                <div id="auth-error" class="hidden mb-4 bg-red-50 text-red-700 p-3 rounded-lg text-sm border border-red-200"></div>
                <div id="auth-success" class="hidden mb-4 bg-green-50 text-green-700 p-3 rounded-lg text-sm border border-green-200"></div>

                <form id="auth-form" class="space-y-5">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">كود الموظف</label>
                        <input type="text" id="auth-code" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">كلمة المرور</label>
                        <input type="password" id="auth-pass" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                    </div>

                    <div id="change-pass-fields" class="hidden space-y-5 border-t pt-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">كلمة المرور الجديدة</label>
                            <input type="password" id="new-pass" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">تأكيد كلمة المرور الجديدة</label>
                            <input type="password" id="confirm-pass" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                        </div>
                    </div>

                    <button type="submit" id="auth-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg transition-all transform active:scale-95 shadow-md">
                        تسجيل الدخول
                    </button>
                </form>

                <div class="mt-6 text-center">
                    <button id="toggle-view" class="text-sm text-indigo-600 hover:underline font-semibold">
                        تغيير كلمة المرور؟
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="dashboard-screen" class="hidden flex h-screen bg-slate-50 overflow-hidden">
        
        <aside id="sidebar" class="fixed lg:static inset-y-0 right-0 w-72 bg-slate-900 text-slate-300 z-30 transform translate-x-full lg:translate-x-0 sidebar-transition flex flex-col">
            <div class="h-16 flex items-center justify-center border-b border-slate-800 bg-slate-950 px-4">
                <span class="text-xl ml-2">🏢</span>
                <h1 class="text-lg font-bold text-white tracking-wide">الإدارة المالية</h1>
            </div>

            <div class="p-5 border-b border-slate-800 bg-slate-900/50">
                <div class="flex items-center space-x-3 space-x-reverse">
                    <div id="user-avatar" class="w-10 h-10 rounded-full bg-indigo-600 flex items-center justify-center text-white font-bold text-lg border-2 border-slate-700"></div>
                    <div class="overflow-hidden">
                        <p id="user-name" class="text-sm font-bold text-white truncate"></p>
                        <p id="user-role" class="text-[10px] text-indigo-400 font-bold uppercase"></p>
                    </div>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto py-4">
                <div class="px-4 mb-6 flex space-x-2 space-x-reverse">
                    <button id="btn-general" class="flex-1 py-2 text-xs font-bold rounded-lg transition-all">الرئيسية</button>
                    <button id="btn-admin" class="hidden flex-1 py-2 text-xs font-bold rounded-lg transition-all">الإداريات</button>
                </div>

                <div class="px-3">
                    <p id="nav-label" class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3 px-3"></p>
                    <ul id="nav-list" class="space-y-1"></ul>
                </div>
            </div>

            <div class="p-4 border-t border-slate-800">
                <button id="logout-btn" class="w-full flex items-center justify-center space-x-2 space-x-reverse px-4 py-2.5 bg-slate-800 hover:bg-red-600 hover:text-white rounded-lg transition-colors text-sm font-bold">
                    <span>🚪</span> <span>خروج آمن</span>
                </button>
            </div>
        </aside>

        <div class="flex-1 flex flex-col min-w-0">
            <header class="h-16 bg-white shadow-sm flex items-center justify-between px-4 lg:px-8 border-b border-gray-200">
                <div class="flex items-center">
                    <button id="mobile-toggle" class="lg:hidden text-gray-500 hover:text-gray-700 ml-4">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
                    </button>
                    <h2 id="page-title" class="text-lg font-bold text-gray-800 flex items-center">
                        <span id="page-icon" class="ml-2 text-xl"></span>
                        <span id="page-name">الرئيسية</span>
                    </h2>
                </div>
                <div class="text-xs text-green-600 font-bold bg-green-50 px-3 py-1.5 rounded-full border border-green-100 flex items-center">
                    <span class="w-2 h-2 rounded-full bg-green-500 ml-2 animate-pulse"></span> اتصال مشفر
                </div>
            </header>

            <main class="flex-1 relative bg-gray-50">
                <div id="iframe-loader" class="absolute inset-0 flex flex-col items-center justify-center bg-white/80 z-20 hidden">
                    <div class="loader mb-4"></div>
                    <p class="text-gray-600 font-bold animate-pulse text-sm">جاري جلب البيانات...</p>
                </div>
                <iframe id="main-iframe" src="about:blank" class="w-full h-full border-0 opacity-0 transition-opacity"></iframe>
            </main>
        </div>
    </div>

    <script>
        // تمويه الرابط لزيادة الأمان
        const _p1 = "https://sample-";
        const _p2 = "firebase-ai-app-";
        const _p3 = "e4260-default-rtdb";
        const _p4 = ".firebaseio.com/branches.json";
        const DB_URL = _p1 + _p2 + _p3 + _p4;

        const GENERAL_LINKS = [
            { id: 'report', title: 'التقرير العام', url: 'https://hr-directions.github.io/Test/', icon: '📊' },
            { id: 'shift_reg', title: 'تسجيل الشيفت', url: 'https://hr-directions.github.io/Treasury-handover/', icon: '📝' },
        ];

        const ADMIN_LINKS = [
            { id: 'transfers_statement', title: 'كشف حساب التحويلات', url: 'https://hr-directions.github.io/Test3/', icon: '💰' },
            { id: 'employees', title: 'إدارة الموظفين', url: 'https://hr-directions.github.io/Test7/', icon: '👥' },
            { id: 'transfers_admin', title: 'إدارة التحويلات', url: 'https://hr-directions.github.io/Test6/', icon: '🔄' },
            { id: 'data_admin', title: 'إدارة البيانات', url: 'https://hr-directions.github.io/Test5/', icon: '📂' },
            { id: 'overstock', title: 'توزيع الاوفر ستوك', url: 'https://hr-directions.github.io/Test2/', icon: '📦' },
            { id: 'hours', title: 'احتساب ساعات الموظفين', url: 'https://hr-directions.github.io/Test4/', icon: '⏱️' },
        ];

        let currentUser = null;
        let isChangePassView = false;

        const authForm = document.getElementById('auth-form');
        const authBtn = document.getElementById('auth-btn');

        authForm.onsubmit = async (e) => {
            e.preventDefault();
            document.getElementById('auth-error').classList.add('hidden');
            document.getElementById('auth-success').classList.add('hidden');
            
            const code = document.getElementById('auth-code').value.trim();
            const pass = document.getElementById('auth-pass').value;
            
            authBtn.disabled = true;
            authBtn.innerText = 'جاري التحقق...';

            try {
                const res = await fetch(DB_URL);
                const data = await res.json();
                
                let foundKey = null;
                let foundUser = null;

                for (const [key, val] of Object.entries(data)) {
                    if (val.code === code && val.password === pass) {
                        foundKey = key; foundUser = val; break;
                    }
                }

                if (!foundUser) throw new Error("بيانات الدخول غير صحيحة");

                if (isChangePassView) {
                    const newP = document.getElementById('new-pass').value;
                    const confirmP = document.getElementById('confirm-pass').value;
                    if (newP.length < 4 || newP !== confirmP) throw new Error("تحقق من مطابقة كلمة المرور الجديدة (4 أرقام على الأقل)");

                    await fetch(DB_URL.replace('.json', `/${foundKey}.json`), {
                        method: 'PATCH',
                        body: JSON.stringify({ password: newP, lastUpdate: new Date().toISOString() })
                    });
                    
                    document.getElementById('auth-success').innerText = "تم التحديث بنجاح!";
                    document.getElementById('auth-success').classList.remove('hidden');
                    setTimeout(() => location.reload(), 1500);
                } else {
                    currentUser = foundUser;
                    initApp();
                }
            } catch (err) {
                document.getElementById('auth-error').innerText = err.message;
                document.getElementById('auth-error').classList.remove('hidden');
            } finally {
                authBtn.disabled = false;
                authBtn.innerText = isChangePassView ? "تحديث البيانات" : "تسجيل الدخول";
            }
        };

        function initApp() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard-screen').classList.remove('hidden');
            
            document.getElementById('user-name').innerText = currentUser.name;
            document.getElementById('user-role').innerText = currentUser.type;
            document.getElementById('user-avatar').innerText = currentUser.name.charAt(0);

            if (currentUser.type === 'مراجع') {
                document.getElementById('btn-admin').classList.remove('hidden');
                switchNav('admin');
            } else {
                switchNav('general');
            }
        }

        function switchNav(type) {
            const isGen = type === 'general';
            document.getElementById('btn-general').className = isGen ? 'flex-1 py-2 text-xs font-bold rounded-lg bg-indigo-600 text-white' : 'flex-1 py-2 text-xs font-bold rounded-lg bg-slate-800 text-slate-400';
            document.getElementById('btn-admin').className = !isGen ? 'flex-1 py-2 text-xs font-bold rounded-lg bg-indigo-600 text-white' : 'flex-1 py-2 text-xs font-bold rounded-lg bg-slate-800 text-slate-400';
            document.getElementById('nav-label').innerText = isGen ? 'القائمة الرئيسية' : 'أدوات الإدارة';
            
            const links = isGen ? GENERAL_LINKS : ADMIN_LINKS;
            const list = document.getElementById('nav-list');
            list.innerHTML = '';
            
            links.forEach(link => {
                const btn = document.createElement('button');
                btn.className = "nav-item w-full flex items-center space-x-3 space-x-reverse px-4 py-3 rounded-xl transition-all text-slate-400 hover:bg-slate-800 mb-1";
                btn.innerHTML = `<span class="text-xl">${link.icon}</span><span class="text-sm font-bold">${link.title}</span>`;
                btn.onclick = () => {
                    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('nav-active'));
                    btn.classList.add('nav-active');
                    document.getElementById('page-name').innerText = link.title;
                    document.getElementById('page-icon').innerText = link.icon;
                    document.getElementById('iframe-loader').classList.remove('hidden');
                    const frame = document.getElementById('main-iframe');
                    frame.style.opacity = '0';
                    frame.src = link.url;
                    frame.onload = () => {
                        document.getElementById('iframe-loader').classList.add('hidden');
                        frame.style.opacity = '1';
                    };
                    if(window.innerWidth < 1024) document.getElementById('sidebar').classList.add('translate-x-full');
                };
                list.appendChild(btn);
            });
            list.firstChild.click();
        }

        document.getElementById('toggle-view').onclick = () => {
            isChangePassView = !isChangePassView;
            document.getElementById('change-pass-fields').classList.toggle('hidden');
            document.getElementById('auth-title').innerText = isChangePassView ? "تحديث الأمان" : "نظام الإدارة المالية";
            authBtn.innerText = isChangePassView ? "تحديث البيانات" : "تسجيل الدخول";
            document.getElementById('toggle-view').innerText = isChangePassView ? "العودة لتسجيل الدخول" : "تغيير كلمة المرور؟";
        };

        document.getElementById('btn-general').onclick = () => switchNav('general');
        document.getElementById('btn-admin').onclick = () => switchNav('admin');
        document.getElementById('mobile-toggle').onclick = () => document.getElementById('sidebar').classList.toggle('translate-x-full');
        document.getElementById('logout-btn').onclick = () => location.reload();
    </script>
</body>
</html>
