
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<link rel="icon" type="image/svg+xml" href="https://raw.githubusercontent.com/HR-Directions/HOME/refs/heads/main/logo.svg">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الإدارة المتكامل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f8fafc;
        }
        .sidebar-transition {
            transition: transform 0.3s ease-in-out;
        }
        /* Loader Animation */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4f46e5;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        /* Active Link Style */
        .nav-active {
            background-color: #4f46e5 !important;
            color: white !important;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
    </style>
</head>
<body class="overflow-hidden">

    <!-- Login Screen -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center bg-slate-100 p-4">
        <div class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden">
            <div class="bg-indigo-600 p-6 text-center">
                <h2 id="auth-title" class="text-2xl font-bold text-white">تسجيل الدخول للنظام</h2>
                <p id="auth-subtitle" class="text-indigo-200 mt-2 text-sm">أدخل كود الموظف وكلمة المرور للمتابعة</p>
            </div>
            
            <div class="p-8">
                <div id="auth-error" class="hidden mb-4 bg-red-50 text-red-700 p-3 rounded-lg text-sm border border-red-200"></div>
                <div id="auth-success" class="hidden mb-4 bg-green-50 text-green-700 p-3 rounded-lg text-sm border border-green-200"></div>

                <form id="auth-form" class="space-y-5">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">كود الموظف</label>
                        <input type="text" id="auth-code" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="أدخل الكود الخاص بك">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">كلمة المرور الحالية</label>
                        <input type="password" id="auth-pass" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="••••••••">
                    </div>

                    <div id="change-pass-fields" class="hidden space-y-5">
                        <div class="border-t pt-4 mt-4">
                            <label class="block text-sm font-medium text-gray-700 mb-1">كلمة المرور الجديدة</label>
                            <input type="password" id="new-pass" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="••••••••">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">تأكيد كلمة المرور الجديدة</label>
                            <input type="password" id="confirm-pass" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="••••••••">
                        </div>
                    </div>

                    <button type="submit" id="auth-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 rounded-lg transition-colors flex justify-center items-center">
                        تسجيل الدخول
                    </button>
                </form>

                <div class="mt-6 text-center">
                    <button id="toggle-view" class="text-sm text-indigo-600 hover:text-indigo-800 font-medium underline">
                        تغيير كلمة المرور؟
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Dashboard Screen -->
    <div id="dashboard-screen" class="hidden flex h-screen bg-slate-50 overflow-hidden">
        
        <!-- Sidebar -->
        <aside id="sidebar" class="fixed lg:static inset-y-0 right-0 w-72 bg-slate-900 text-slate-300 z-30 transform translate-x-full lg:translate-x-0 sidebar-transition flex flex-col">
            <div class="h-16 flex items-center justify-center border-b border-slate-800 bg-slate-950 px-4">
                <h1 class="text-lg font-bold text-white tracking-wide truncate">نظام الإدارة</h1>
            </div>

            <div class="p-5 border-b border-slate-800 bg-slate-900/50">
                <div class="flex items-center space-x-3 space-x-reverse">
                    <div id="user-avatar" class="w-10 h-10 rounded-full bg-indigo-600 flex items-center justify-center text-white font-bold text-lg flex-shrink-0"></div>
                    <div class="overflow-hidden">
                        <p id="user-name" class="text-sm font-medium text-white truncate"></p>
                        <p id="user-role" class="text-xs text-slate-400 mt-1"></p>
                    </div>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto py-4">
                <div class="px-4 mb-6 flex space-x-2 space-x-reverse">
                    <button id="btn-general" class="flex-1 py-2 text-xs font-bold rounded-lg transition-all bg-indigo-600 text-white">الرئيسية</button>
                    <button id="btn-admin" class="hidden flex-1 py-2 text-xs font-bold rounded-lg transition-all bg-slate-800 hover:bg-slate-700 text-slate-400">الإداريات</button>
                </div>

                <div class="px-3">
                    <p id="nav-label" class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3 px-3">القائمة الرئيسية</p>
                    <ul id="nav-list" class="space-y-1">
                        <!-- Links will be here -->
                    </ul>
                </div>
            </div>

            <div class="p-4 border-t border-slate-800">
                <button id="logout-btn" class="w-full flex items-center justify-center space-x-2 space-x-reverse px-4 py-2.5 bg-slate-800 hover:bg-red-600 hover:text-white rounded-lg transition-colors text-sm font-medium">
                    <span>🚪</span> <span>تسجيل الخروج</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col min-w-0">
            <header class="h-16 bg-white shadow-sm flex items-center justify-between px-4 lg:px-8 border-b border-gray-200">
                <div class="flex items-center">
                    <button id="mobile-toggle" class="lg:hidden text-gray-500 hover:text-gray-700 ml-4">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
                    </button>
                    <h2 id="page-title" class="text-lg font-bold text-gray-800 flex items-center">
                        <span id="page-icon" class="ml-2 text-xl"></span>
                        <span id="page-name">الرئيسية</span>
                    </h2>
                </div>
                <div class="flex items-center">
                    <div class="hidden sm:flex text-xs text-gray-500 items-center bg-gray-100 px-3 py-1.5 rounded-full border">
                        <span class="w-2 h-2 rounded-full bg-green-500 ml-2"></span> اتصال آمن
                    </div>
                </div>
            </header>

            <main class="flex-1 relative bg-gray-100/50">
                <div id="iframe-loader" class="absolute inset-0 flex flex-col items-center justify-center bg-gray-50/80 z-10 hidden">
                    <div class="loader mb-4"></div>
                    <p class="text-gray-600 font-bold animate-pulse text-sm">جاري جلب البيانات...</p>
                </div>
                <iframe id="main-iframe" src="about:blank" class="w-full h-full border-0 transition-opacity duration-300 opacity-0"></iframe>
            </main>
        </div>
    </div>

    <script>
        const DB_URL = "https://sample-firebase-ai-app-e4260-default-rtdb.firebaseio.com/branches.json";
        
        // الصفحة الرئيسية متاحة للجميع
        const GENERAL_LINKS = [
            { id: 'report', title: 'التقرير العام', url: 'https://hr-directions.github.io/Test/', icon: '📊' },
            { id: 'shift_reg', title: 'تسجيل الشيفت', url: 'https://hr-directions.github.io/Treasury-handover/', icon: '📝' },
        ];

        // صفحات الإداريات متاحة للمراجع فقط
        const ADMIN_LINKS = [
            { id: 'transfers_statement', title: 'كشف حساب التحويلات', url: 'https://hr-directions.github.io/Test3/', icon: '💰' },
            { id: 'employees', title: 'إدارة الموظفين', url: 'https://hr-directions.github.io/Test7/', icon: '👥' },
            { id: 'transfers_admin', title: 'إدارة التحويلات', url: 'https://hr-directions.github.io/Test6/', icon: '🔄' },
            { id: 'data_admin', title: 'إدارة البيانات', url: 'https://hr-directions.github.io/Test5/', icon: '📂' },
            { id: 'overstock', title: 'توزيع الاوفر ستوك', url: 'https://hr-directions.github.io/Test2/', icon: '📦' },
            { id: 'hours', title: 'احتساب ساعات الموظفين', url: 'https://hr-directions.github.io/Test4/', icon: '⏱️' },
        ];

        let currentUser = null;
        let isChangePassView = false;
        let activeSection = 'general';

        const loginScreen = document.getElementById('login-screen');
        const dashScreen = document.getElementById('dashboard-screen');
        const authForm = document.getElementById('auth-form');
        const changePassFields = document.getElementById('change-pass-fields');
        const toggleBtn = document.getElementById('toggle-view');
        const authBtn = document.getElementById('auth-btn');
        const authError = document.getElementById('auth-error');
        const authSuccess = document.getElementById('auth-success');
        const iframe = document.getElementById('main-iframe');
        const iframeLoader = document.getElementById('iframe-loader');

        toggleBtn.onclick = () => {
            isChangePassView = !isChangePassView;
            authError.classList.add('hidden');
            authSuccess.classList.add('hidden');
            if (isChangePassView) {
                document.getElementById('auth-title').innerText = "تحديث كلمة المرور";
                changePassFields.classList.remove('hidden');
                authBtn.innerText = "تحديث البيانات";
                toggleBtn.innerText = "العودة لتسجيل الدخول";
            } else {
                document.getElementById('auth-title').innerText = "تسجيل الدخول للنظام";
                changePassFields.classList.add('hidden');
                authBtn.innerText = "تسجيل الدخول";
                toggleBtn.innerText = "تغيير كلمة المرور؟";
            }
        };

        authForm.onsubmit = async (e) => {
            e.preventDefault();
            authError.classList.add('hidden');
            authSuccess.classList.add('hidden');
            const code = document.getElementById('auth-code').value;
            const pass = document.getElementById('auth-pass').value;
            
            authBtn.disabled = true;
            authBtn.innerHTML = 'جاري التحقق...';

            try {
                const response = await fetch(DB_URL);
                const data = await response.json();
                let userKey = null;
                let userObj = null;

                for (const [key, val] of Object.entries(data)) {
                    if (val.code === code && val.password === pass) {
                        userKey = key; userObj = val; break;
                    }
                }

                if (!userObj) throw new Error("الكود أو كلمة المرور الحالية غير صحيحة");

                if (isChangePassView) {
                    const newP = document.getElementById('new-pass').value;
                    const confirmP = document.getElementById('confirm-pass').value;
                    if (!newP || newP.length < 4) throw new Error("كلمة المرور الجديدة يجب أن تكون 4 أرقام على الأقل");
                    if (newP !== confirmP) throw new Error("كلمات المرور الجديدة غير متطابقة");

                    await fetch(`https://sample-firebase-ai-app-e4260-default-rtdb.firebaseio.com/branches/${userKey}.json`, {
                        method: 'PATCH',
                        body: JSON.stringify({ password: newP, lastUpdate: new Date().toISOString() })
                    });
                    
                    authSuccess.innerText = "تم تحديث كلمة المرور بنجاح!";
                    authSuccess.classList.remove('hidden');
                    setTimeout(() => toggleBtn.click(), 2000);
                } else {
                    currentUser = userObj;
                    initDashboard();
                }
            } catch (err) {
                authError.innerText = err.message;
                authError.classList.remove('hidden');
            } finally {
                authBtn.disabled = false;
                authBtn.innerText = isChangePassView ? "تحديث البيانات" : "تسجيل الدخول";
            }
        };

        function initDashboard() {
            loginScreen.classList.add('hidden');
            dashScreen.classList.remove('hidden');
            document.getElementById('user-name').innerText = currentUser.name;
            document.getElementById('user-role').innerText = currentUser.type;
            document.getElementById('user-avatar').innerText = currentUser.name.charAt(0);

            if (currentUser.type === 'مراجع') {
                document.getElementById('btn-admin').classList.remove('hidden');
            }

            switchSection('general');
        }

        function switchSection(section) {
            activeSection = section;
            const isGen = section === 'general';
            document.getElementById('btn-general').className = isGen ? 'flex-1 py-2 text-xs font-bold rounded-lg bg-indigo-600 text-white' : 'flex-1 py-2 text-xs font-bold rounded-lg bg-slate-800 text-slate-400 hover:text-white';
            document.getElementById('btn-admin').className = !isGen ? 'flex-1 py-2 text-xs font-bold rounded-lg bg-indigo-600 text-white' : 'flex-1 py-2 text-xs font-bold rounded-lg bg-slate-800 text-slate-400 hover:text-white';
            document.getElementById('nav-label').innerText = isGen ? 'القائمة الرئيسية' : 'إدارة ومراجعة البيانات';
            
            const links = isGen ? GENERAL_LINKS : ADMIN_LINKS;
            renderLinks(links);
            loadPage(links[0]);
        }

        function renderLinks(links) {
            const list = document.getElementById('nav-list');
            list.innerHTML = '';
            links.forEach(link => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <button class="nav-item w-full flex items-center space-x-3 space-x-reverse px-4 py-3 rounded-xl transition-all text-right hover:bg-slate-800 text-slate-400 font-medium" data-id="${link.id}">
                        <span class="text-xl">${link.icon}</span>
                        <span class="text-sm">${link.title}</span>
                    </button>
                `;
                li.querySelector('button').onclick = () => loadPage(link);
                list.appendChild(li);
            });
        }

        function loadPage(link) {
            document.getElementById('page-name').innerText = link.title;
            document.getElementById('page-icon').innerText = link.icon;
            iframeLoader.classList.remove('hidden');
            iframe.style.opacity = '0';
            iframe.src = link.url;
            iframe.onload = () => {
                iframeLoader.classList.add('hidden');
                iframe.style.opacity = '1';
            };
            
            document.querySelectorAll('.nav-item').forEach(btn => {
                if (btn.dataset.id === link.id) btn.classList.add('nav-active');
                else btn.classList.remove('nav-active');
            });

            document.getElementById('sidebar').classList.add('translate-x-full');
        }

        document.getElementById('btn-general').onclick = () => switchSection('general');
        document.getElementById('btn-admin').onclick = () => switchSection('admin');
        document.getElementById('mobile-toggle').onclick = () => document.getElementById('sidebar').classList.toggle('translate-x-full');
        document.getElementById('logout-btn').onclick = () => location.reload();

    </script>
</body>
</html>
